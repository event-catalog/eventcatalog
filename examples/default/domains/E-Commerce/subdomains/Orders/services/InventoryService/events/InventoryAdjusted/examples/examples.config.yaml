stock-increase.json:
  name: Stock Increase
  summary: Inventory increased due to a bulk customer return from a cancelled corporate order.
  usage: |
    curl -X POST http://localhost:3000/events/publish \
      -H "Content-Type: application/json" \
      -d @stock-increase.json

stock-decrease.json:
  name: Stock Decrease
  summary: Inventory decreased after 18 damaged units were identified during a quarterly inventory audit.
  usage: |
    curl -X POST http://localhost:3000/events/publish \
      -H "Content-Type: application/json" \
      -d @stock-decrease.json
